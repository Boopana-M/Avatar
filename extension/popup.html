<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      margin: 0;
      padding: 16px;
    }
    h3 {
      color: #00adb5;
      margin-top: 0;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
    }
    .footer {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h3>ISL Interpreter</h3>
  <p>To use the Indian Sign Language interpreter:</p>
  <ol style="padding-left: 20px; font-size: 13px; line-height: 1.6;">
    <li>Open any video on YouTube.</li>
    <li>Click the <b>"Use avatar"</b> button next to the YouTube player.</li>
    <li>Watch the floating 3D avatar sign in real-time.</li>
  </ol>
  <div class="footer">ISL Avatar Extension v1.0.0</div>
</body>
</html>
